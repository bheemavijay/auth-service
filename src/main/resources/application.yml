server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/interview_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: interview-secret-key-for-jwt-token-must-be-long-enough-for-hs256
  expiration: 86400000
